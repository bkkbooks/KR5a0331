body:
  text: 夷夏論夫辨是與非宜據聖典尋二教之源故兩標經句道經云老子入關之天竺維衛國國王夫人名曰淨妙老子因其晝寢乘日精入淨妙口中後年四月八日夜半時剖左腋而生墜地即行七步於是佛道興焉此出玄妙內篇佛經云釋迦成佛有塵劫之數出法華無量壽或為國師道士儒林之宗出瑞應本起歡論之曰五帝三皇不聞有佛國師道士無過老莊儒林之宗孰出周孔若孔老非佛誰則當之然二經所説如合符契道則佛也佛則道也其聖則符其迹則反或和光以明近或曜靈以示遠道濟天下故無方而不入智周萬物故無物而不為其入不同其為必異各成其性不易其事是以端委搢紳諸華之容翦髮曠衣群夷之服擎跽罄折候甸之恭狐蹲狗踞荒流之肅棺殯槨葬中夏之制火焚水沈西戎之俗全形守禮繼善之教毀貌易性絶惡之舉豈伊同人愛及異物鳥王獸長往往是佛無窮世界聖人代興或昭五興或布三乘在鳥而鳥鳴在獸而獸吼教華而華言化夷而夷語耳雖舟車均於致遠而有川陸之節佛道齊乎達此而有夷夏之別若謂其致既均其法可換者而車可涉川舟可行陸乎今以中夏之性效西戎之法既不全同又不全異下育妻孥上廢宗祀嗜欲之物皆以禮伸孝敬之典獨以法屈悖禮犯順曾莫之覺弱喪忘歸孰識其舊且理之可貴者道也事之可賤者俗也捨華效夷義將安取若以道邪道固符合矣若以俗邪俗則大乖矣屢見刻舷沙門守株道士交諍小大互相彈射或域道以為兩或混俗以為一是牽異以為同被同以為異則乖爭之由淆亂之本也尋聖道雖同而法有左右始乎無端終子無末泥洹仙化各是一術佛號正真道稱正一一歸無死真會無生在名則反在實則合但無生之教賒無死之化切切化可以進謙弱法可以退夸強佛教文而博道教質而精精非粗人所信博非精人所能佛言華而引道言實而抑抑則明者獨進引則昧者競前佛經繁而顯道經簡而幽幽則妙門難見顯則正路易遵此二法之辨也聖匠無心方圓有體器既殊用教亦異施佛是破惡之方道是興善之術興善則自然為高破惡則勇猛為貴佛迹光大宜以化物道迹密微利用為己優劣之分大略在茲夫蹲夷之儀婁羅之辨各出彼俗自相矜解猶蟲喧鳥聒何足述效道人通公駁白日停光恆星隱照誕降之應事在老先似非入關方炳斯端又老莊周孔有可存者依日末光憑釋遺法盜牛竊善反以成蠹檢究源流終異吾黨之為道耳西域之記佛經之説俗以膝行為禮不慕蹲坐為恭道以三繞為虔不尚踞傲為肅豈專戎士愛亦茲方襄童謁帝膝而進趙王見周三環而止今佛法在華乘者常安戒善行交蹈者恆通文王造周大伯創吳革化戎夷不因舊俗豈若舟車理無代用佛法垂化或因或革清信之士容衣不改息心之人服貌必變變本從道不遵彼俗俗風自殊無患其亂孔老釋迦其人或同觀方設教其道必異孔老治世為本釋氏出世為宗發軫既殊其歸亦異符合之唱自由臆説又仙化以變形為上泥洹以陶神為先變形者白首還緇而未能無死陶神者使塵惑日損湛然常存泥洹之道無死之地乖詭若此何謂其同歡答曰案道經之作著自西周佛經之來始乎東漢年逾八百代懸數十若謂黃老雖久而濫在釋前是呂尚盜陳恆之齊劉季竊王莽之漢也經云戎氣強獷乃復略人頰車邪又夷俗長跽法與華異翹左跂右全是蹲踞故周公禁之於前仲尼戒之於後又舟以濟川車以征陸佛起於戎豈非戎俗素惡邪道出於華豈非華風本善邪今華風既變惡同戎狄佛來破之良有以矣佛道實貴故戒業可遵戎俗實賤故言貌可棄今諸華士女氏族弗革而露首偏踞濫用夷禮云於翦落之徒同是胡人國有舊風法不可變又若觀風流教其道必異佛非東華之道道非西戎之法魚鳥異淵永不相關安得老釋二教交行八表今佛既東流道亦西邁故知世有精粗教有文質然則道教執本以領末佛教救末以存本請問所異歸在何許若以翦落為異則胥靡翦落矣若以立像為異則俗巫立像矣此非所歸歸在常住常住之象常道孰異神仙有死權便之説神仙是大化之總稱非窮妙之至名至名無名其有名者二十七品仙變成真真變成神或謂之聖各有九品品極則入空寂無為無名若服食茹芝延壽萬億壽盡則死樂極則枯此修考之士非神仙之流也南齊書顧歡傳南史顧歡傳太平御覽卷六百五十三引道經曰至無量壽前後約本傳之文
